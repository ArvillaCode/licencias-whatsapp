<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear cuenta — Upfunnel Admin</title>
  <link rel="stylesheet" href="auth.css" />
  <script src="theme.js"></script>
</head>
<body>
  <button class="theme-toggle" id="themeBtn" title="Cambiar tema">🌙</button>
  <div class="auth-card">
    <h1>Crear cuenta</h1>
    <p class="subtitle">Regístrate como administrador de Upfunnel</p>
    <div class="backend-url-field">
      <label for="bkUrl">URL del backend</label>
      <input type="text" id="bkUrl" placeholder="http://localhost:3000" />
    </div>
    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="mínimo 3 caracteres" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="mínimo 6 caracteres" autocomplete="new-password" />
    </div>
    <div class="field">
      <label for="password2">Confirmar contraseña</label>
      <input type="password" id="password2" placeholder="repite tu contraseña" autocomplete="new-password" />
    </div>
    <div id="status" class="status"></div>
    <button id="signupBtn" class="btn">Crear cuenta</button>
    <div class="auth-link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
  </div>
  <script src="auth-helpers.js"></script>
  <script src="signup.js"></script>
</body>
</html>
