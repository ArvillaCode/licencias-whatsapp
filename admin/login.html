<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión — Upfunnel Admin</title>
  <link rel="stylesheet" href="auth.css" />
  <script src="theme.js"></script>
</head>
<body>
  <button class="theme-toggle" id="themeBtn" title="Cambiar tema">🌙</button>
  <div class="auth-card">
    <h1>Upfunnel Admin</h1>
    <p class="subtitle">Inicia sesión para gestionar licencias</p>
    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="tu_usuario" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div id="status" class="status"></div>
    <button id="loginBtn" class="btn">Iniciar sesión</button>
    <div class="auth-link">
      ¿No tienes cuenta? <a href="signup.html">Regístrate aquí</a>
    </div>
  </div>
  <script src="auth-helpers.js"></script>
  <script src="login.js"></script>
</body>
</html>
